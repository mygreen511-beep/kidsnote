name: Build 키즈노트백업

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python build.py
      - run: cd dist && zip -r 키즈노트백업_Mac.zip 키즈노트백업
      - uses: actions/upload-artifact@v4
        with:
          name: 키즈노트백업_Mac
          path: dist/키즈노트백업_Mac.zip

  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: chcp 65001 && python build.py
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: 키즈노트백업_Windows
          path: dist/키즈노트백업.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/키즈노트백업_Mac/키즈노트백업_Mac.zip
            artifacts/키즈노트백업_Windows/키즈노트백업.exe
