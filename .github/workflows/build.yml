name: Build 키즈노트백업

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python build.py
      - run: cd dist && zip -r kidsnote_mac.zip */
      - uses: actions/upload-artifact@v4
        with:
          name: kidsnote-mac
          path: dist/kidsnote_mac.zip

  build-windows:
    runs-on: windows-latest
    env:
      PYTHONUTF8: "1"
      PYTHONIOENCODING: utf-8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: chcp 65001 && python build.py
        shell: cmd
      - run: |
          for %%f in (dist\*.exe) do move "%%f" "dist\kidsnote_backup.exe"
        shell: cmd
      - uses: actions/upload-artifact@v4
        with:
          name: kidsnote-windows
          path: dist/kidsnote_backup.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - run: ls -R artifacts/
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kidsnote-mac/kidsnote_mac.zip
            artifacts/kidsnote-windows/kidsnote_backup.exe
